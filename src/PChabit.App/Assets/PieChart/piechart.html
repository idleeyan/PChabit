<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #ffffff;
            overflow: hidden; 
        }
        #chart { width: 100%; height: 100%; }
        #empty {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
        }
        #empty-icon { font-size: 48px; margin-bottom: 16px; }
        #empty-text { font-size: 16px; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <div id="empty" style="display: none;">
        <div id="empty-icon">📊</div>
        <div id="empty-text">暂无数据</div>
    </div>
    <script>
        var chart = null;
        
        function showEmpty() {
            document.getElementById('chart').style.display = 'none';
            document.getElementById('empty').style.display = 'flex';
        }
        
        function hideEmpty() {
            document.getElementById('chart').style.display = 'block';
            document.getElementById('empty').style.display = 'none';
        }
        
        function renderPieChart(data) {
            try {
                if (!data || data.length === 0) {
                    showEmpty();
                    return 'error: no data';
                }
                
                hideEmpty();
                
                if (chart) {
                    chart.dispose();
                }
                chart = echarts.init(document.getElementById('chart'));
                
                var pieData = data.map(function(item) {
                    return {
                        name: item.name,
                        value: item.value,
                        itemStyle: {
                            color: item.color || '#8B5CF6'
                        }
                    };
                });
                
                var totalMinutes = data.reduce(function(sum, item) {
                    return sum + (item.value || 0);
                }, 0);
                
                chart.setOption({
                    backgroundColor: '#ffffff',
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        borderColor: '#ddd',
                        borderWidth: 1,
                        textStyle: {
                            color: '#333'
                        },
                        formatter: function(params) {
                            var mins = params.value || 0;
                            var hours = Math.floor(mins / 60);
                            var minutes = Math.round(mins % 60);
                            var timeStr = hours > 0 ? hours + '小时' + minutes + '分钟' : minutes + '分钟';
                            return '<div style="padding: 4px 8px;"><strong style="font-size: 14px;">' + params.name + '</strong><br/><span style="color: #666;">' + timeStr + '</span><br/><span style="color: #999;">占比: ' + params.percent.toFixed(1) + '%</span></div>';
                        }
                    },
                    legend: {
                        orient: 'vertical',
                        right: 20,
                        top: 'center',
                        itemWidth: 12,
                        itemHeight: 12,
                        textStyle: {
                            fontSize: 12,
                            color: '#333'
                        },
                        formatter: function(name) {
                            var item = data.find(function(d) { return d.name === name; });
                            if (item) {
                                var mins = item.value || 0;
                                var hours = Math.floor(mins / 60);
                                var minutes = Math.round(mins % 60);
                                var timeStr = hours > 0 ? hours + 'h' + minutes + 'm' : Math.round(mins) + 'm';
                                return name + ' (' + timeStr + ')';
                            }
                            return name;
                        }
                    },
                    series: [{
                        type: 'pie',
                        radius: ['45%', '70%'],
                        center: ['35%', '50%'],
                        avoidLabelOverlap: true,
                        itemStyle: {
                            borderRadius: 6,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: false
                        },
                        emphasis: {
                            label: {
                                show: false
                            },
                            itemStyle: {
                                shadowBlur: 20,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        },
                        labelLine: {
                            show: false
                        },
                        data: pieData
                    }]
                });
                
                return 'success: ' + pieData.length + ' items';
            } catch (e) {
                return 'error: ' + e.message;
            }
        }
        
        function resize() {
            if (chart) chart.resize();
        }
        
        window.onresize = resize;
    </script>
</body>
</html>
